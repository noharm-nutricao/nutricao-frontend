services:
  postgres:
    image: postgres:11.6
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: noharm
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
      - "5001:5000"
    volumes:
      - ../nutricao-database:/docker-entrypoint-initdb.d/db
      - ./docker/db/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../nutricao-backend
      dockerfile: ../nutricao-frontend/docker/backend/Dockerfile.local
    network_mode: "service:postgres"
    environment:
      MAIL_HOST: http://localhost:3000
      SECRET_KEY: "E2ESECRETKEY"
      API_KEY: "E2EAPIKEY"
      ENV: "test"
    depends_on:
      postgres:
        condition: service_healthy